<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Painel da Campanha — Fórmula do Ego</title>
  <meta name="theme-color" content="#0d2c6b">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/componentes.css">
  <link rel="stylesheet" href="css/mestre.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div id="tela-loading" class="tela-loading">
    <div class="spinner"></div>
    <p>Carregando campanha...</p>
  </div>

  <div id="app-mestre" hidden>

    <header class="mestre-topbar">
      <div class="container mestre-topbar-inner">
        <a href="index.html" class="ficha-voltar" aria-label="Voltar ao início">←</a>
        <div class="mestre-topbar-titulo">
          <h1 id="texto-nome-campanha">Campanha</h1>
          <span class="texto-discreto" id="texto-rodada-atual">Rodada 1</span>
        </div>
        <button class="btn btn-primario" id="btn-passar-rodada-mestre">Passar Rodada</button>
      </div>
    </header>

    <main class="container mestre-conteudo">

      <section class="card mestre-card-convite">
        <h3>Convidar jogadores</h3>
        <p class="texto-discreto">Mande este código (ou o link) para o seu time.</p>
        <div class="mestre-convite-box">
          <span id="texto-codigo-convite" class="mestre-codigo">------</span>
          <button class="btn btn-secundario btn-pequeno" id="btn-copiar-codigo">Copiar código</button>
          <button class="btn btn-secundario btn-pequeno" id="btn-copiar-link">Copiar link de convite</button>
        </div>
      </section>

      <section>
        <div class="mestre-grid-header">
          <h2>Jogadores na campanha</h2>
          <span class="pill" id="pill-qtd-jogadores">0 jogadores</span>
        </div>
        <div id="grid-fichas-campanha" class="grid-fichas-campanha">
          <div class="estado-vazio">
            <h3>Nenhum jogador ainda</h3>
            <p>Compartilhe o código de convite acima.</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="js/pagina-mestre.js"></script>
</body>
</html>
