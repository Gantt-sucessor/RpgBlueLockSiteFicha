<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrar na Campanha — Fórmula do Ego</title>
  <meta name="theme-color" content="#0d2c6b">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/componentes.css">
  <link rel="stylesheet" href="css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div id="tela-loading" class="tela-loading">
    <div class="spinner"></div>
    <p>Carregando...</p>
  </div>

  <header class="home-header">
    <div class="container home-header-inner">
      <a href="index.html" class="home-logo" style="text-decoration:none;">
        <svg class="home-logo-pent" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2 L22 9.5 L18.2 21 L5.8 21 L2 9.5 Z M12 8 L15.5 10.6 L14.2 14.8 L9.8 14.8 L8.5 10.6 Z" fill="currentColor"/>
        </svg>
        <span>FÓRMULA DO EGO</span>
      </a>
    </div>
  </header>

  <main class="home-main">
    <div class="container">
      <div id="conteudo-entrada" style="max-width:520px;margin:0 auto;" hidden>
        <div class="card">
          <p class="pill" id="pill-nome-campanha" style="margin-bottom:10px;"></p>
          <h2 id="titulo-entrada">Escolha sua ficha</h2>
          <p class="texto-discreto" id="sub-entrada">Selecione uma ficha existente ou crie uma nova para entrar nesta campanha.</p>

          <div id="lista-fichas-existentes" class="lista-fichas-usuario" style="margin: 16px 0;"></div>

          <button class="btn btn-primario" id="btn-criar-nova-ficha" style="width:100%;">
            + Criar ficha nova para esta campanha
          </button>
        </div>
      </div>

      <div id="erro-entrada" class="estado-vazio" hidden>
        <h3>Campanha não encontrada</h3>
        <p>Confira o código de convite com o Mestre.</p>
        <a href="index.html" class="btn btn-secundario">Voltar ao início</a>
      </div>
    </div>
  </main>

  <script type="module" src="js/pagina-entrar-campanha.js"></script>
</body>
</html>
